[tools]
swift = "6.2.3"
swiftlint = "0.63.2"

[vars]
SCHEME = "Jerboa"
DESTINATION = "platform=macOS"
APP_NAME = "Jerboa.app"
CONFIGURATION = "Release"
DERIVED_DATA = "~/Library/Developer/Xcode/DerivedData"
ICON_SOURCE = ".github/logo-2.png"
ICON_DIR = "App/Assets.xcassets/AppIcon.appiconset"

[tasks.generate]
description = "Generate .xcodeproj from project.yml"
run = """
mkdir -p BuildConfig
SHA=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
VER=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 0.0.0)
NEW="GIT_SHA = $SHA
GIT_VERSION = $VER"
OUT=BuildConfig/GitInfo.local.xcconfig
if [ -f "$OUT" ] && [ "$(cat "$OUT")" = "$NEW" ]; then :; else echo "$NEW" > "$OUT"; fi
xcodegen generate
"""

[tasks.build]
description = "Build the app"
depends = ["generate"]
run = """
xcodebuild build \
  -scheme "$MISE_TASK_ARG_SCHEME" \
  -destination "$MISE_TASK_ARG_DESTINATION" \
  -configuration "$MISE_TASK_ARG_CONFIGURATION" \
  CODE_SIGNING_ALLOWED=NO
"""
[tasks.build.env]
MISE_TASK_ARG_SCHEME = "{{vars.SCHEME}}"
MISE_TASK_ARG_DESTINATION = "{{vars.DESTINATION}}"
MISE_TASK_ARG_CONFIGURATION = "{{vars.CONFIGURATION}}"

[tasks.debug]
description = "Build for debugging"
depends = ["generate"]
run = """
xcodebuild build \
  -scheme "$MISE_TASK_ARG_SCHEME" \
  -destination "$MISE_TASK_ARG_DESTINATION" \
  -configuration Debug \
  CODE_SIGNING_ALLOWED=NO
"""
[tasks.debug.env]
MISE_TASK_ARG_SCHEME = "{{vars.SCHEME}}"
MISE_TASK_ARG_DESTINATION = "{{vars.DESTINATION}}"

[tasks.run]
description = "Run the app (debug build)"
depends = ["debug"]
run = """
app=$(find $DERIVED_DATA/Jerboa-*/Build/Products/Debug -name "$APP_NAME" -maxdepth 1 2>/dev/null | head -1)
if [ -n "$app" ]; then open "$app"; else echo "App not found. Build first."; exit 1; fi
"""
[tasks.run.env]
DERIVED_DATA = "{{vars.DERIVED_DATA}}"
APP_NAME = "{{vars.APP_NAME}}"

[tasks.test]
description = "Run Xcode project tests"
depends = ["generate"]
run = """
xcodebuild test \
  -scheme "$MISE_TASK_ARG_SCHEME" \
  -destination "$MISE_TASK_ARG_DESTINATION" \
  CODE_SIGNING_ALLOWED=NO
"""
[tasks.test.env]
MISE_TASK_ARG_SCHEME = "{{vars.SCHEME}}"
MISE_TASK_ARG_DESTINATION = "{{vars.DESTINATION}}"

[tasks.uitest]
description = "Run UI tests (requires signing)"
depends = ["generate"]
run = """
xcodebuild -quiet test \
  -scheme JerboaUITests \
  -destination "$MISE_TASK_ARG_DESTINATION" \
  -allowProvisioningUpdates
"""
[tasks.uitest.env]
MISE_TASK_ARG_DESTINATION = "{{vars.DESTINATION}}"

[tasks."test-package"]
description = "Run Swift package tests"
run = "cd Shared && swift test"

[tasks.lint]
description = "Run SwiftLint and Biome"
run = """
swiftlint lint --config .swiftlint.yml App/ QuickLook/ Tests/
biome check
"""

[tasks."lint:fix"]
description = "Auto-fix lint issues with Biome"
run = "biome check --write"

[tasks."test-js"]
description = "Run Vitest WebKit browser tests"
run = "cd Tests/js && npx vitest run"

[tasks.sign]
description = "Ad-hoc sign the release build"
depends = ["build"]
run = """
app=$(find $DERIVED_DATA/Jerboa-*/Build/Products/$CONFIGURATION -name "$APP_NAME" -maxdepth 1 2>/dev/null | head -1)
codesign --sign - --force --deep "$app"
"""
[tasks.sign.env]
DERIVED_DATA = "{{vars.DERIVED_DATA}}"
CONFIGURATION = "{{vars.CONFIGURATION}}"
APP_NAME = "{{vars.APP_NAME}}"

[tasks.zip]
description = "Create zip for distribution"
depends = ["sign"]
run = """
app=$(find $DERIVED_DATA/Jerboa-*/Build/Products/$CONFIGURATION -name "$APP_NAME" -maxdepth 1 2>/dev/null | head -1)
ditto -c -k --sequesterRsrc --keepParent "$app" Jerboa.zip
"""
[tasks.zip.env]
DERIVED_DATA = "{{vars.DERIVED_DATA}}"
CONFIGURATION = "{{vars.CONFIGURATION}}"
APP_NAME = "{{vars.APP_NAME}}"

[tasks.install]
description = "Install app and CLI"
depends = ["sign"]
run = """
app=$(find $DERIVED_DATA/Jerboa-*/Build/Products/$CONFIGURATION -name "$APP_NAME" -maxdepth 1 2>/dev/null | head -1)
if [ -z "$app" ]; then echo "App not found. Build first."; exit 1; fi
rm -rf /Applications/$APP_NAME
cp -R "$app" /Applications/$APP_NAME
echo "Installed $APP_NAME to /Applications/"
ln -sf /Applications/$APP_NAME/Contents/MacOS/Jerboa /usr/local/bin/jerboa
echo "Symlinked jerboa to /usr/local/bin/jerboa"
"""
[tasks.install.env]
DERIVED_DATA = "{{vars.DERIVED_DATA}}"
CONFIGURATION = "{{vars.CONFIGURATION}}"
APP_NAME = "{{vars.APP_NAME}}"

[tasks."icon:generate"]
description = "Generate app icon with AI (requires 1Password)"
run = "scripts/generate-icon.sh"

[tasks."icon:resize"]
description = "Generate all icon sizes from source logo"
run = """
for size in 16 32 64 128 256 512 1024; do
  sips -z $size $size "$ICON_SOURCE" --out "$ICON_DIR/icon_$size.png" --setProperty format png > /dev/null 2>&1
  echo "Generated icon_$size.png"
done
"""
[tasks."icon:resize".env]
ICON_SOURCE = "{{vars.ICON_SOURCE}}"
ICON_DIR = "{{vars.ICON_DIR}}"

[tasks.clean]
description = "Clean build artifacts"
run = """
rm -rf Jerboa.xcodeproj
cd Shared && swift package clean
"""
